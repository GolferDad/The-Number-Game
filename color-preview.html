<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #1e1b4b; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; gap: 32px; }
    h2 { color: white; letter-spacing: 2px; margin: 0; }
    .row { display: flex; gap: 8px; align-items: center; }
    .label { color: #a78bfa; font-size: 14px; font-weight: bold; width: 80px; }
    .tile { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 20px; font-weight: 700; color: white; }
    .section { display: flex; flex-direction: column; gap: 12px; }
  </style>
</head>
<body>
  <h2>COLOR OPTIONS</h2>

  <div class="section">
    <div class="row">
      <span class="label">Option 1</span>
      <div class="tile" style="background:#06b6d4">5</div>
      <div class="tile" style="background:#06b6d4">7</div>
      <div class="tile" style="background:#787c7e">3</div>
      <span style="color:#06b6d4; margin-left:8px">#06b6d4 cyan-500</span>
    </div>
    <div class="row">
      <span class="label">Option 2</span>
      <div class="tile" style="background:#22d3ee">5</div>
      <div class="tile" style="background:#22d3ee">7</div>
      <div class="tile" style="background:#787c7e">3</div>
      <span style="color:#22d3ee; margin-left:8px">#22d3ee cyan-400</span>
    </div>
    <div class="row">
      <span class="label">Option 3</span>
      <div class="tile" style="background:#2dd4bf">5</div>
      <div class="tile" style="background:#2dd4bf">7</div>
      <div class="tile" style="background:#787c7e">3</div>
      <span style="color:#2dd4bf; margin-left:8px">#2dd4bf teal-400</span>
    </div>
  </div>

  <h2 style="margin-top:16px">IN CONTEXT</h2>
  <div class="section">
    <div class="row">
      <span class="label">Easy</span>
      <div class="tile" style="background:#6aaa64">5</div>
      <div class="tile" style="background:#c9b458">7</div>
      <div class="tile" style="background:#787c7e">3</div>
    </div>
    <div class="row">
      <span class="label">Normal</span>
      <div class="tile" style="background:#22d3ee">5</div>
      <div class="tile" style="background:#22d3ee">7</div>
      <div class="tile" style="background:#787c7e">3</div>
    </div>
  </div>
</body>
</html>
